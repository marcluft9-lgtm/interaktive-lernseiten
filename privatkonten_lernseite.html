<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privatkonten – Interaktive Lernseite</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ─────────────────────────────────────────────
   BASIS‑CSS – 1:1 übernommen aus warenverkehr_lernseite.html
   (Farbschema, Layout, Typografie, Boxen, Tabellen, T‑Konten)
   ───────────────────────────────────────────── */

/* Reset */
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#f0f2f7;
  font-family:'IBM Plex Sans',Arial,sans-serif;
  color:#1a1d27;
  font-size:15px;
  line-height:1.6;
}

/* Header */
header{
  background:linear-gradient(135deg,#1a4d2e,#2d8a52);
  color:#fff;
  padding:24px 40px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
header h1{font-size:1.6rem;font-weight:700;}
header p{opacity:.82;margin-top:4px;font-size:.9rem;}

/* Navigation */
nav{
  background:#1a4d2e;
  display:flex;
  gap:2px;
  padding:0 40px;
  overflow-x:auto;
  flex-wrap:nowrap;
}
nav button{
  background:none;
  border:none;
  color:rgba(255,255,255,.65);
  padding:10px 14px;
  cursor:pointer;
  font-size:.82rem;
  border-bottom:3px solid transparent;
  white-space:nowrap;
  transition:all .15s;
  font-family:'IBM Plex Sans',Arial,sans-serif;
}
nav button:hover{color:#fff;background:rgba(255,255,255,.08);}
nav button.aktiv-tab{color:#fff;border-bottom-color:#7ee8a2;}

/* Seitencontainer */
.container{
  max-width:980px;
  margin:0 auto;
  padding:28px 20px 64px;
}
.seite{display:none;}
.seite.sichtbar{display:block;}

/* Cards */
.card{
  background:#fff;
  border:1px solid #d8dce8;
  border-radius:12px;
  padding:1.4rem;
  margin-bottom:1.4rem;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.card-title{
  font-size:.72rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:#8a90a8;
  margin-bottom:1.1rem;
}

/* Farbboxen */
.box-ek{background:#eafaf1;border:1.5px solid #a9dfbf;}
.box-vk{background:#e8f4fd;border:1.5px solid #9ac5e6;}
.box-warn{background:#fff9e6;border:1.5px solid #f5d98b;}
.box-neutral{background:#f7f8fc;border:1.5px solid #d0d4e8;}

/* Konten-Grid */
.konten-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin:14px 0;
}
.konten-box{
  border-radius:8px;
  padding:14px 16px;
}
.konten-box h3{font-size:.95rem;margin-bottom:8px;}
.konten-box.ek h3{color:#1a6b3c;}
.konten-box.vk h3{color:#1a5276;}

/* Merksätze */
.merksatz{
  background:#fffbe6;
  border-left:4px solid #f1c40f;
  padding:9px 14px;
  border-radius:0 6px 6px 0;
  font-weight:600;
  margin:12px 0;
  font-size:.88rem;
}
.merksatz.gruen{background:#eafaf1;border-left-color:#27ae60;}
.merksatz.blau{background:#e8f4fd;border-left-color:#2d7abf;}
.merksatz.rot{background:#fdedec;border-left-color:#e74c3c;}
.merksatz.lila{background:#f5f0ff;border-left-color:#8b5cf6;}
